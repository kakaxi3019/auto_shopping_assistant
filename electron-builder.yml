appId: com.autoshopping.app
productName: 自动购物助手
directories:
  buildResources: build
  output: D:\workspace\release-output
files:
  - dist
  - dist-electron
extraResources:
  - from: build/auto_shopping_app_icon.png
    to: app-icon/auto_shopping_app_icon.png
  - from: extra/playwright-browsers/
    to: playwright-browsers/
    filter:
      - "**/*"
  - from: node_modules/sql.js/dist/
    to: sql.js/
    filter:
      - "*.wasm"
win:
  target:
    - target: portable
      arch:
        - x64
  icon: build/auto_shopping_app_icon.png
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
